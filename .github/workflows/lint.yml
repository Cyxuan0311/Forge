---
name: Lint

"on":
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    name: C++ Formatting (clang-format)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format

      - name: Check C++ formatting
        run: |
          find . \( -name '*.cpp' -o -name '*.h' \
            -o -name '*.cu' -o -name '*.cuh' \) \
            -not -path './build/*' \
            -not -path './_deps/*' \
            -exec clang-format --dry-run --Werror {} +

  cmake-lint:
    name: CMake Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cmake-format
        run: pip install cmake-format

      - name: Check CMake formatting
        run: |
          find . -name 'CMakeLists.txt' \
            -not -path './build/*' \
            -not -path './_deps/*' \
            -exec cmake-format --check {} +

  python-lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/bindings/ tests/ benchmarks/ examples/ tools/

  python-types:
    name: Python Types (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mypy
        run: pip install mypy

      - name: Run mypy
        run: mypy --ignore-missing-imports src/bindings/ || true

  shellcheck:
    name: Shell Scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          find . -name '*.sh' -not -path './build/*' -not -path './_deps/*' \
            -exec shellcheck {} +

  yamllint:
    name: YAML Formatting (yamllint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint .github/workflows/ .github/ISSUE_TEMPLATE/

  actionlint:
    name: GitHub Actions Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check workflows
        uses: reviewdog/action-actionlint@v1
